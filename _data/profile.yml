short_bio: >-
  <p>
    Hello! My name is Mansi Goel. I am a Postdoctoral Researcher at the <strong>University of Copenhagen, Denmark</strong> in Department of Food Science under <a href="https://food.ku.dk/english/staff/?pure=en/persons/159399" target="_blank">Prof. Rasmus Bro</a>. My research focuses on leveraging <strong>Machine Learning, Natural Language Processing (NLP), Large Language Models (LLMs), and Data Science</strong> to revolutionize the food and flavor; an emerging domain known as Computational Gastronomy.
  </p>
  <p>
    Before joining the University of Copenhagen, I completed my <strong>PhD</strong> at IIIT-Delhi, India. My doctoral research, supervised by <a href="https://iiitd.ac.in/bagler" target="_blank">Dr. Ganesh Bagler</a>, explored how AI can make food computable, leading to tools for novel recipe generation, predictive models for molecular toxicity and sweetness, and comprehensive databases like FlavorDB2. I am passionate about developing AI-driven methods that bridge the gap between traditional food science and modern computational techniques.
  </p>
  <p>
    During my PhD, I had the opportunity to work as a Visiting Researcher at the National Institute of Informatics in Japan. My earlier academic journey includes a Dual Degree (B.Tech & M.Tech) in <strong>Computer Science and Engineering</strong> from JIIT Noida, where I laid my foundation in algorithms and computational modeling.
  </p>
  <p>
    Thank you for visiting my website! I am always interested in meaningful collaborations in the areas of computational gastronomy, predictive modeling, and applied AI in life sciences. Feel free to reach out if you’d like to discuss research ideas or potential collaborations.
  </p>

